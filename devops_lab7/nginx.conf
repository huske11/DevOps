server {
        listen 80 default_server;
        listen 443 ssl;

        ssl_certificate /etc/ssl/nginx.crt;
        ssl_certificate_key /etc/ssl/nginx.key;

        root /var/www/html;

        index index.html index.htm index.nginx-debian.html;

        server_name nginx-server;

        location / {
                try_files $uri $uri/ =404;
        }
}